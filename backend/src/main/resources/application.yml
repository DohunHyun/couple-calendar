spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/couple_calendar?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

app:
  push:
    # log = 로그 출력(기본). 실제 FCM/APNS 연동 시 별도 PushSender 구현체 추가 후 전환.
    provider: log
  jwt:
    # 운영에서는 반드시 JWT_SECRET 환경변수로 주입할 것. 아래 값은 로컬 개발 전용 더미.
    secret: ${JWT_SECRET:dev-only-insecure-secret-please-override-in-prod-0123456789}
    access-token-minutes: 720
  cors:
    # 웹 dev + Capacitor 네이티브 앱(WebView) origin. 배포된 웹 프론트가 있으면 그 도메인도 추가.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,capacitor://localhost,http://localhost,https://localhost}
  oauth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      authorize-uri: https://kauth.kakao.com/oauth/authorize
      token-uri: https://kauth.kakao.com/oauth/token
      user-info-uri: https://kapi.kakao.com/v2/user/me
      scope: profile_nickname account_email
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      authorize-uri: https://accounts.google.com/o/oauth2/v2/auth
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
      scope: openid profile email https://www.googleapis.com/auth/calendar.readonly
